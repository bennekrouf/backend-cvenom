name: Deploy backend

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & restart cvenom-backend
    runs-on: ubuntu-latest
    timeout-minutes: 30        # Rust builds can take a while

    steps:
      - name: SSH into VPS and run backend deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 28m
          script: |
            sudo bash /opt/cvenom/src/backend-cvenom/deploy.sh
